spring.application.name: config-server
spring:
  cloud:
    config:
      server:
        git:
          uri: https://github.com/${git_username}/ecommerce-config-server
          username: ${git_username}
          password: ${password_config}
          default-label: main
server:
  port: 8888
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
